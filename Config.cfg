# Creating role 
set system aaa authorization role netops superuser true
set system aaa authorization role netops services [cli gnmi]

# Creating user and apply the role 
set system aaa authentication user gnmi password gnmi
set system aaa authentication user gnmi role [netops]

# Server gPRC 
set system grpc-server mgmt admin-state enable
set system grpc-server mgmt network-instance mgmt
set system grpc-server mgmt port 57400
set system grpc-server mgmt tls-profile clab-profile
set system grpc-server mgmt services [gnmi gnoi gnsi gribi p4rt]
